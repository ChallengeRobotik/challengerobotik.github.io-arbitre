<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arbitrage - Challenge Robotik</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/XxJybFzH/Design-sans-titre.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --accent: #ffffff; --bg: #000000; --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-mute: #888888;
            --blue: #3b82f6; --green: #10b981; --red: #ff4b4b; --input-bg: #1a1a1a;
        }
        [data-theme="light"] {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0;
            --text-main: #1d1d1f; --text-mute: #86868b; --accent: #000000; --input-bg: #e5e5e5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background-color: var(--bg); min-height: 100vh; transition: background 0.3s; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader-bar { width: 150px; height: 1px; background: var(--border); overflow: hidden; position: relative; }
        .loader-bar::after { content: ""; position: absolute; width: 40%; height: 100%; background: var(--accent); animation: loading 1.5s infinite ease-in-out; }
        @keyframes loading { from { left: -40%; } to { left: 100%; } }

        nav { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; border-right: 1px solid var(--border); background: var(--surface); backdrop-filter: blur(20px); display: none; flex-direction: column; align-items: center; padding: 30px 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--text-mute); width: 44px; height: 44px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn.active { color: var(--text-main); background: var(--border); }
        
        @media (max-width: 900px) {
            nav { bottom: 0; top: auto; width: 100%; height: 70px; border-right: none; border-top: 1px solid var(--border); flex-direction: row; justify-content: center; align-items: center; padding: 0; }
            .nav-btn { margin-bottom: 0; flex: 1; height: 100%; border-radius: 0; }
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; width: 100%; }
        @media (min-width: 900px) { .container { padding-left: 120px; } }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .btn { border-radius: 10px; padding: 12px 20px; font-weight: 500; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-main { background: var(--text-main); color: var(--bg); }
        .btn-sub { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background: rgba(255, 75, 75, 0.1); color: var(--red); border: 1px solid rgba(255, 75, 75, 0.2); }
        
        input, select, textarea { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text-main); width: 100%; margin-bottom: 15px; font-family: inherit; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
        .score-row.active { border-color: var(--green); background: rgba(16, 185, 129, 0.05); }
        .score-display { font-size: 70px; font-weight: 700; text-align: center; margin: 15px 0; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-inner { background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .hidden { display: none !important; }
        .tag { background: var(--border); padding: 4px 10px; border-radius: 100px; font-size: 11px; display: inline-flex; align-items: center; gap: 5px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .history-card { cursor: pointer; transition: 0.2s; }
        .history-card:hover { border-color: var(--accent); }

        #suspended-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .detail-box { background: var(--surface); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-top: 10px; }
        .detail-title { font-size: 10px; text-transform: uppercase; color: var(--text-mute); letter-spacing: 1px; margin-bottom: 5px; }
        .detail-points { font-size: 12px; line-height: 1.5; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader"><div class="loader-bar"></div></div>

    <div id="suspended-screen">
        <i data-lucide="circle-x" style="width: 100px; height: 100px; color: var(--red); margin-bottom: 20px;"></i>
        <h1>COMPTE SUSPENDU</h1>
        <p style="color: var(--text-mute); margin-top: 10px;">Veuillez contacter l'administrateur.</p>
        <button class="btn btn-sub" style="margin-top: 30px;" onclick="logout()">Retour</button>
    </div>

    <nav id="main-nav">
        <div style="margin-bottom: 20px;"><img src="https://i.ibb.co/XxJybFzH/Design-sans-titre.png" style="width: 35px;"></div>
        <button class="nav-btn active" onclick="switchTab('tab-match', this)"><i data-lucide="zap"></i></button>
        <button class="nav-btn" onclick="switchTab('tab-teams', this)"><i data-lucide="users"></i></button>
        <button class="nav-btn" onclick="switchTab('tab-history', this)"><i data-lucide="calendar"></i></button>
        <button id="admin-nav-btn" class="nav-btn hidden" onclick="switchTab('tab-admin', this)"><i data-lucide="command"></i></button>
        <button class="nav-btn" onclick="toggleTheme()"><i data-lucide="sun" id="theme-icon"></i></button>
        <button class="nav-btn" onclick="logout()"><i data-lucide="log-out"></i></button>
    </nav>

    <div class="container">
        <header>
            <div><span id="arbiter-display" style="font-size: 10px; color: var(--text-mute); font-weight: 700; text-transform: uppercase;"></span><h1 id="page-title">Session en cours</h1></div>
        </header>

        <section id="tab-match" class="tab-pane active">
            <div id="setup-view">
                <div class="glass-card">
                    <h3>Préparation du Duel</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:15px;">
                        <select id="sel-A"></select><select id="sel-B"></select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-main" style="flex: 1; justify-content: center;" onclick="launchMatch()">Lancer le match</button>
                        <button class="btn btn-sub" onclick="randomizeTeams()"><i data-lucide="shuffle"></i></button>
                    </div>
                </div>
                <div class="glass-card">
                    <h3>Message Discord</h3>
                    <textarea id="manual-msg" placeholder="Texte à envoyer..."></textarea>
                    <button class="btn btn-sub" style="width: 100%; justify-content: center;" onclick="sendAnnonce()"><i data-lucide="send"></i> Diffuser</button>
                </div>
            </div>

            <div id="match-area" class="hidden">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <div class="tag">Duel Live</div>
                    <button class="btn btn-danger" style="padding: 5px 15px;" onclick="openPenaltyModal()">+ Faute</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h2 id="name-A" style="color: var(--blue)"></h2>
                            <button class="btn btn-sub" style="padding:5px;" onclick="openComment('A')"><i data-lucide="message-square"></i></button>
                        </div>
                        <div class="score-display" id="total-A">0</div>
                        <label class="subtitle" style="font-size: 12px; color: var(--text-mute)">Temps écoulé (s)</label>
                        <input type="number" id="time-A" value="70" oninput="calc()">
                        <div id="items-A"></div>
                        <div id="penalties-A" style="margin-top:10px; display: flex; flex-wrap: wrap; gap: 5px;"></div>
                    </div>
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h2 id="name-B" style="color: var(--green)"></h2>
                            <button class="btn btn-sub" style="padding:5px;" onclick="openComment('B')"><i data-lucide="message-square"></i></button>
                        </div>
                        <div class="score-display" id="total-B">0</div>
                        <label class="subtitle" style="font-size: 12px; color: var(--text-mute)">Temps écoulé (s)</label>
                        <input type="number" id="time-B" value="70" oninput="calc()">
                        <div id="items-B"></div>
                        <div id="penalties-B" style="margin-top:10px; display: flex; flex-wrap: wrap; gap: 5px;"></div>
                    </div>
                </div>
                <button class="btn btn-main" style="width: 100%; padding: 20px; margin-top: 15px;" onclick="finishMatch()">Valider le score final</button>
            </div>
        </section>

        <section id="tab-teams" class="tab-pane">
            <div class="glass-card">
                <h3>Equipes Inscrites</h3>
                <div style="display: flex; gap: 10px; margin-top:15px;"><input type="text" id="new-team-name" placeholder="Nom équipe"><button class="btn btn-main" onclick="addTeam()">Ajouter</button></div>
                <div id="teams-list" style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>
        </section>

        <section id="tab-history" class="tab-pane">
            <div id="history-list"></div>
        </section>

        <section id="tab-admin" class="tab-pane">
            <div class="glass-card">
                <h3>Gestion des Arbitres</h3>
                <div id="arbiters-list" style="margin-bottom: 20px;"></div>
                <input type="text" id="adm-new-name" placeholder="Nom complet"><input type="text" id="adm-new-id" placeholder="Identifiant"><input type="text" id="adm-new-pass" placeholder="Mot de passe">
                <button class="btn btn-main" style="width:100%" onclick="addArbiter()">Créer compte</button>
            </div>
            <div class="glass-card" style="border-color: var(--red);">
                <h3 style="color: var(--red);">Réinitialisation</h3>
                <button class="btn btn-danger" style="width:100%; justify-content: center; margin-top: 10px;" onclick="resetHistory()">Supprimer tout l'historique des matchs</button>
            </div>
        </section>
    </div>

    <div id="penalty-modal" class="modal"><div class="modal-inner"><h3>Signaler une faute</h3><select id="pen-team-select"></select><input type="number" id="pen-value" value="5"><button class="btn btn-main" style="width:100%;" onclick="applyPenalty()">Appliquer malus</button><button class="btn btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('penalty-modal')">Annuler</button></div></div>
    <div id="comment-modal" class="modal"><div class="modal-inner"><h3>Note d'équipe</h3><textarea id="team-comment" style="height:100px;"></textarea><input type="hidden" id="comment-side"><button class="btn btn-main" style="width:100%" onclick="saveComment()">Sauvegarder</button><button class="btn btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('comment-modal')">Fermer</button></div></div>
    <div id="tie-modal" class="modal"><div class="modal-inner" style="text-align: center;"><h2>Egalité</h2><p>Désignez un vainqueur tactique :</p><div style="display: grid; gap: 10px; margin-top: 20px;"><button id="tie-btn-A" class="btn btn-main" onclick="resolveTie('A')"></button><button id="tie-btn-B" class="btn btn-main" onclick="resolveTie('B')"></button></div></div></div>
    
    <div id="detail-modal" class="modal">
        <div class="modal-inner" id="detail-content"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCayfDcG1_UgtucU1sExenPfcXozBL2HoQ",
            authDomain: "challengerobotik.firebaseapp.com",
            databaseURL: "https://challengerobotik-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "challengerobotik",
            storageBucket: "challengerobotik.firebasestorage.app",
            messagingSenderId: "414754555947",
            appId: "1:414754555947:web:8021bb3d33e2b7fd37026e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1469228329293840385/ca2i2wZpF__gC7lNFYVL5TdDNG02wFAjaLtwMvCPQaQohGRFBdIDEBT6xaCmiqE43JFB";
        
        const RULES = [
            { l: 'Zone de départ validée', p: 10 }, { l: 'Astronaute en sécurité', p: 15 }, 
            { l: 'Activation voyant', p: 15 }, { l: 'Lancement fusée', p: 15 }, 
            { l: 'Système Leds ok', p: 15 }, { l: 'Fusée stabilisée', p: 15 }, 
            { l: 'Arrivée sur Lune', p: 0 }
        ];

        let TEAMS = [], USERS = [], NOTES = {}, GLOBAL_HISTORY = [];
        let activePens = { A: [], B: [] }, arrivalOrder = [], pendingMatch = null;

        window.toggleTheme = () => {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        };

        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };

        onValue(ref(db, 'history'), (snap) => { 
            const data = snap.val();
            GLOBAL_HISTORY = data ? Object.values(data) : [];
            renderHistory(); 
        });

        onValue(ref(db, 'teams'), (snap) => { TEAMS = snap.val() || []; updateUI(); document.getElementById('loader').classList.add('hidden'); });
        onValue(ref(db, 'notes'), (snap) => { NOTES = snap.val() || {}; });
        onValue(ref(db, 'arbiters'), (snap) => { 
            const admin = {"id":"MrFr_G8mC","pass":"Fc-01061970","name":"Mr FRAMBOURT"};
            USERS = snap.val() ? [admin, ...Object.values(snap.val())] : [admin];
            renderArbiters();
            
            const s = localStorage.getItem('persistent_session');
            if(s) {
                const u = JSON.parse(s);
                const current = USERS.find(x => x.id === u.id);
                if(current && current.suspended && current.id !== 'MrFr_G8mC') {
                    document.getElementById('suspended-screen').style.display = 'flex';
                }
            }
        });

        window.onload = () => { 
            lucide.createIcons(); 
            const s = localStorage.getItem('persistent_session'); 
            if(s) {
                showApp(JSON.parse(s));
            } else {
                window.location.href = "page.html";
            }
        };

        window.showApp = (u) => { 
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('arbiter-display').innerText = "Arbitre : " + u.name; 
            if(u.id === 'MrFr_G8mC') document.getElementById('admin-nav-btn').classList.remove('hidden');
        };

        const renderHistory = () => {
            const list = document.getElementById('history-list');
            if (GLOBAL_HISTORY.length === 0) {
                list.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:20px;'>Aucun match enregistré.</p>";
                return;
            }
            list.innerHTML = [...GLOBAL_HISTORY].reverse().map((m, i) => {
                const realIdx = GLOBAL_HISTORY.length - 1 - i;
                return `
                <div class="glass-card history-card" onclick="showMatchDetail(${realIdx})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${m.teamA.nom} <span style="color:var(--text-mute)">vs</span> ${m.teamB.nom}</b>
                        <small style="opacity:0.6">${m.date}</small>
                    </div>
                    <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span class="tag" style="background:var(--green); color:#000; font-weight:700">Gagnant : ${m.verdict}</span>
                        <span style="font-weight:700; font-size:18px;">${m.teamA.score} - ${m.teamB.score}</span>
                    </div>
                </div>`
            }).join('');
        };

        window.showMatchDetail = (idx) => {
            const m = GLOBAL_HISTORY[idx];
            if(!m) return;
            document.getElementById('detail-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0">Détails du Match</h2>
                    <button class="btn btn-sub" onclick="closeModal('detail-modal')" style="padding:5px;"><i data-lucide="x"></i></button>
                </div>
                <div style="background:var(--surface); padding:15px; border-radius:15px; margin-bottom:20px; font-size:13px; border-left: 4px solid var(--blue);">
                    <p><b>Arbitre :</b> ${m.arb || 'Inconnu'}</p>
                    <p><b>Date :</b> ${m.date}</p>
                    <p><b>Vainqueur :</b> <span style="color:var(--green); font-weight:bold;">${m.verdict}</span></p>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div style="padding:15px; border-radius:12px; border:1px solid ${m.verdict === m.teamA.nom ? 'var(--green)' : 'var(--border)'}">
                        <b style="color:var(--blue)">${m.teamA.nom}</b><br>
                        <span style="font-size:26px; font-weight:800">${m.teamA.score} pts</span>
                        <div class="detail-box">
                            <div class="detail-title">Actions</div>
                            <div class="detail-points">
                                ${m.teamA.actions && m.teamA.actions.length > 0 ? m.teamA.actions.map(a => `• ${a}`).join('<br>') : 'Aucun point'}
                                ${m.teamA.penalties > 0 ? `<br><span style="color:var(--red)">• Malus: -${m.teamA.penalties}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div style="padding:15px; border-radius:12px; border:1px solid ${m.verdict === m.teamB.nom ? 'var(--green)' : 'var(--border)'}">
                        <b style="color:var(--green)">${m.teamB.nom}</b><br>
                        <span style="font-size:26px; font-weight:800">${m.teamB.score} pts</span>
                        <div class="detail-box">
                            <div class="detail-title">Actions</div>
                            <div class="detail-points">
                                ${m.teamB.actions && m.teamB.actions.length > 0 ? m.teamB.actions.map(a => `• ${a}`).join('<br>') : 'Aucun point'}
                                ${m.teamB.penalties > 0 ? `<br><span style="color:var(--red)">• Malus: -${m.teamB.penalties}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('detail-modal').style.display = 'flex';
            lucide.createIcons();
        };

        window.launchMatch = () => {
            const tA = document.getElementById('sel-A').value, tB = document.getElementById('sel-B').value;
            if(tA === tB) return alert("Choisissez deux équipes différentes");
            document.getElementById('name-A').innerText = tA; document.getElementById('name-B').innerText = tB;
            arrivalOrder = []; activePens = { A: [], B: [] };
            ['A','B'].forEach(s => {
                document.getElementById(`items-${s}`).innerHTML = RULES.map(r => `<div class="score-row" onclick="handleCheck('${s}', '${r.l}', this)"><span>${r.l}</span><input type="checkbox" class="chk-${s}" data-pts="${r.p}" style="display:none"></div>`).join('');
                document.getElementById(`penalties-${s}`).innerHTML = '';
            });
            document.getElementById('setup-view').classList.add('hidden'); document.getElementById('match-area').classList.remove('hidden');
            calc();
        };

        window.handleCheck = (side, label, el) => {
            const cb = el.querySelector('input'); cb.checked = !cb.checked; el.classList.toggle('active', cb.checked);
            if(label === 'Arrivée sur Lune') { if(cb.checked) arrivalOrder.push(side); else arrivalOrder = arrivalOrder.filter(s => s !== side); }
            calc();
        };

        window.removePenalty = (side, idx) => {
            activePens[side].splice(idx, 1);
            renderPenalties(side);
            calc();
        };

        const renderPenalties = (side) => {
            document.getElementById(`penalties-${side}`).innerHTML = activePens[side].map((p, i) => 
                `<span class="tag" style="color:var(--red); border:1px solid var(--red)">-${p.pts} <i data-lucide="x" style="width:10px; cursor:pointer" onclick="event.stopPropagation(); removePenalty('${side}', ${i})"></i></span>`
            ).join('');
            lucide.createIcons();
        };

        window.calc = () => {
            ['A', 'B'].forEach(s => {
                let p = 0; document.querySelectorAll(`.chk-${s}`).forEach(c => { if(c.checked) p += parseInt(c.dataset.pts); });
                const r = arrivalOrder.indexOf(s); if(r === 0) p += 25; else if(r === 1) p += 10;
                const t = parseInt(document.getElementById(`time-${s}`).value) || 0; if(t < 70) p += Math.min(60, (70-t)*2);
                activePens[s].forEach(pen => p -= pen.pts);
                document.getElementById(`total-${s}`).innerText = Math.max(0, p);
            });
        };

        window.finishMatch = () => {
            const sA = parseInt(document.getElementById('total-A').innerText), sB = parseInt(document.getElementById('total-B').innerText);
            const user = JSON.parse(localStorage.getItem('persistent_session'));
            
            const getActs = (s) => { 
                let a = []; 
                document.querySelectorAll(`.chk-${s}`).forEach(c => { 
                    if(c.checked) a.push(c.parentElement.querySelector('span').innerText); 
                }); 
                const rank = arrivalOrder.indexOf(s);
                if(rank === 0) a.push("Bonus 1er arrivé (+25)");
                if(rank === 1) a.push("Bonus 2ème arrivé (+10)");
                return a; 
            };
            const getPens = (s) => activePens[s].reduce((acc, p) => acc + p.pts, 0);

            pendingMatch = { 
                date: new Date().toLocaleString('fr-FR'), 
                arb: user.name, 
                teamA: { 
                    nom: document.getElementById('name-A').innerText, 
                    score: sA, 
                    temps: document.getElementById('time-A').value, 
                    actions: getActs('A'), 
                    penalties: getPens('A') 
                }, 
                teamB: { 
                    nom: document.getElementById('name-B').innerText, 
                    score: sB, 
                    temps: document.getElementById('time-B').value, 
                    actions: getActs('B'), 
                    penalties: getPens('B') 
                } 
            };

            if(sA === sB) { 
                document.getElementById('tie-btn-A').innerText = pendingMatch.teamA.nom; 
                document.getElementById('tie-btn-B').innerText = pendingMatch.teamB.nom; 
                document.getElementById('tie-modal').style.display = 'flex'; 
            } else { 
                pendingMatch.verdict = sA > sB ? pendingMatch.teamA.nom : pendingMatch.teamB.nom; 
                saveMatch(); 
            }
        };

        const saveMatch = async () => {
            // Envoi Webhook Discord
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🏁 Fin de Match - Challenge Robotik",
                            color: 5814783,
                            fields: [
                                { name: "Équipe A", value: `**${pendingMatch.teamA.nom}**\nScore: ${pendingMatch.teamA.score}`, inline: true },
                                { name: "Équipe B", value: `**${pendingMatch.teamB.nom}**\nScore: ${pendingMatch.teamB.score}`, inline: true },
                                { name: "Résultat", value: `🏆 Victoire : **${pendingMatch.verdict}**` },
                                { name: "Arbitre", value: pendingMatch.arb, inline: true }
                            ],
                            footer: { text: "Session 2026" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (e) { console.error(e); }

            await push(ref(db, 'history'), pendingMatch);
            window.location.reload();
        };

        window.resetHistory = () => {
            if(confirm("Voulez-vous supprimer TOUS les matchs ?")) {
                remove(ref(db, 'history')).then(() => alert("Historique vidé."));
            }
        };

        window.renderArbiters = () => {
            document.getElementById('arbiters-list').innerHTML = USERS.map(u => `
                <div class="glass-card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${u.name}</b><br><small style="opacity:0.6">${u.id}</small></div>
                    <div style="display:flex; gap:10px;">
                        ${u.id !== 'MrFr_G8mC' ? `
                            <button class="btn btn-sub" onclick="toggleSuspend('${u.id}', ${u.suspended})">${u.suspended ? 'Rétablir' : 'Suspendre'}</button>
                            <button class="btn btn-danger" style="padding:10px" onclick="removeArbiter('${u.id}')"><i data-lucide="trash-2" size="16"></i></button>
                        ` : '<span class="tag">Admin</span>'}
                    </div>
                </div>`).join('');
            lucide.createIcons();
        };

        window.toggleSuspend = (id, state) => update(ref(db, 'arbiters/'+id), { suspended: !state });
        window.removeArbiter = (id) => { if(confirm("Supprimer l'arbitre ?")) remove(ref(db, 'arbiters/'+id)); };
        window.addArbiter = () => {
            const n = document.getElementById('adm-new-name').value, id = document.getElementById('adm-new-id').value, p = document.getElementById('adm-new-pass').value;
            if(n && id && p) set(ref(db, 'arbiters/'+id), {id, name:n, pass:p, suspended: false});
        };

        window.updateUI = () => {
            const opts = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('sel-A').innerHTML = opts; document.getElementById('sel-B').innerHTML = opts;
            document.getElementById('teams-list').innerHTML = TEAMS.map((t, i) => `<span class="tag">${t} <i data-lucide="x" style="width:10px; cursor:pointer" onclick="removeTeam(${i})"></i></span>`).join('');
            lucide.createIcons();
        };

        window.openComment = (side) => {
            const name = document.getElementById(`name-${side}`).innerText;
            document.getElementById('comment-side').value = side;
            document.getElementById('team-comment').value = NOTES[name] || "";
            document.getElementById('comment-modal').style.display = 'flex';
        };

        window.saveComment = () => {
            const side = document.getElementById('comment-side').value, name = document.getElementById(`name-${side}`).innerText;
            update(ref(db, 'notes'), { [name]: document.getElementById('team-comment').value });
            closeModal('comment-modal');
        };

        window.openPenaltyModal = () => { 
            document.getElementById('pen-team-select').innerHTML = `<option value="A">${document.getElementById('name-A').innerText}</option><option value="B">${document.getElementById('name-B').innerText}</option>`;
            document.getElementById('penalty-modal').style.display = 'flex'; 
        };
        window.applyPenalty = () => { 
            const s = document.getElementById('pen-team-select').value, val = parseInt(document.getElementById('pen-value').value);
            activePens[s].push({ pts: val }); 
            renderPenalties(s);
            calc(); closeModal('penalty-modal'); 
        };

        window.sendAnnonce = () => {
            const msg = document.getElementById('manual-msg').value; if(!msg) return;
            fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ 
                content: "@everyone", embeds: [{ title: "📢 Annonce", description: msg, color: 16777215 }]
            }) });
            document.getElementById('manual-msg').value = "";
            alert("Annonce envoyée !");
        };

        window.resolveTie = (v) => { pendingMatch.verdict = v === 'A' ? pendingMatch.teamA.nom : pendingMatch.teamB.nom; saveMatch(); };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.randomizeTeams = () => { if(TEAMS.length < 2) return; let p = [...TEAMS].sort(() => 0.5 - Math.random()); document.getElementById('sel-A').value = p[0]; document.getElementById('sel-B').value = p[1]; };
        window.addTeam = () => { const n = document.getElementById('new-team-name').value; if(n){ set(ref(db, 'teams'), [...TEAMS, n]); document.getElementById('new-team-name').value=""; } };
        window.removeTeam = (i) => { if(confirm("Supprimer l'équipe ?")) set(ref(db, 'teams'), TEAMS.filter((_, idx) => idx !== i)); };
        
        window.logout = () => { 
            localStorage.removeItem('persistent_session'); 
            window.location.href = "page.html";
        };
    </script>
</body>
</html>
